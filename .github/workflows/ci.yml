name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy scikit-learn matplotlib pyyaml msprime pytest pyflakes
      - name: Lint (pyflakes)
        run: pyflakes archaic *.py tests tools oase1_bam_pipeline
      - name: Run tests
        run: pytest -q
